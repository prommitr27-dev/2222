ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 1. รับข้อมูลจากล้อ (Odometry) เอาแค่ความเร็วแนวแกน X (เดินหน้า/ถอยหลัง)
    odom0: /diff_cont/odom
    odom0_config: [false,  false,  false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]

    # 2. รับข้อมูลจาก IMU เอาแค่องศาการเลี้ยว (Yaw) และความเร็วการเลี้ยว (Yaw Velocity)
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
